name: Build & Push Container (manual)

# Baut das Single-Container-Image (Frontend + Backend) und pusht es nach GHCR.
# Der Dockerfile liegt in backend/, braucht aber das Repo-Root als Context
# (er kopiert sowohl frontend/ als auch backend/).
#
# HINWEIS: Der automatische Deploy auf `main`/Tags läuft jetzt über ci.yml
# HINTER dem Test-Gate (backend-test + frontend-check). Dieser Workflow bleibt
# nur als MANUELLER Notfall-Build erhalten (workflow_dispatch) und triggert
# bewusst NICHT mehr automatisch auf Push — sonst würde doppelt gebaut/gepusht
# und das Test-Gate umgangen.

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
